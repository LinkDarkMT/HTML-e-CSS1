<h1>Tags de Títulos</h1>

<p>O elemento de título é representado pelas tags &lt;h1&gt; até &lt;h6&gt; e é usado para definir a hierarquia de títulos em uma página web. O &lt;h1&gt; é o título principal, seguido pelos subtítulos &lt;h2&gt;, &lt;h3&gt;, &lt;h4&gt;, &lt;h5&gt; e &lt;h6&gt;.</p>
