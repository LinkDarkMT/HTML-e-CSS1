    <h1>Tag de Parágrafos</h1>
    <p>O elemento de parágrafo é representado pela tag &lt;p&gt; e é usado para agrupar um bloco de texto em um parágrafo. Ele é uma das tags mais comuns em HTML e é essencial para a estruturação do conteúdo textual em uma página web.</p>
