<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas Numeradas</title>

  <style>

        body {

            text-align: center;
            border: 15px solid rgb(31, 95, 192);
            border-radius: 30px;
            background-color: rgba(18, 175, 223, 0.644);
            margin: 40px;
            padding: 40px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        div{
            box-shadow: 0 4px 8px rgba(3, 3, 3, 1);
            padding: 20px;
            border-radius: 20px;
            background-color: rgba(8, 8, 8, 0.089);
            margin: 20px auto;
        }

        p {
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            
        }

        ol {

            width: 200px;
            margin: 20px auto;
            text-align: left;
            
        }

        li{

            white-space: nowrap;
            text-align: left;
            margin: 5px center;
            margin-left: 40px;
        }

    
        .caixa {

            
            color: rgb(31, 95, 192);
            font-weight: bold; 
            width: 290px;
            margin: 0px auto;
            margin-top: -20px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(3, 3, 3, 1);
            padding: 20px;
            border-radius: 20px;
            background-color: rgba(8, 8, 8, 0.089);
        }

</style>

</head>
<body>
    <h1>Listas Numeradas</h1>
    
    <div>
        <p>A tag de lista numerada é representada pela tag &lt;ol&gt; (ordenada) e é usada para criar uma lista em que os itens são numerados automaticamente.</p>
        <br>
        <ol>
            <li>Primeiro Item</li>
            <li>Segundo item</li>
            <li>Terceiro item</li>
        </ol>
    </div>
    <br>
    

    <p class="caixa"><a href="../index.html">Voltar</a></p>
   
</body>
</html>
