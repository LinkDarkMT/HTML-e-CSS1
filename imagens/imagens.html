    <h1>Tag de Imagens</h1>
    <p>A tag de imagem é representada pela tag &lt;img&gt; e é usada para incorporar imagens em uma página web. Ela é um elemento vazio, o que significa que não tem uma tag de fechamento, e requer o atributo "src" para especificar o caminho da imagem a ser exibida.</p>
