    <h1>Tag de Abreviações</h1>
    <p>A tag de abreviação é representada pela tag &lt;abbr&gt; e é usada para marcar uma abreviação ou sigla em um texto. Ela é útil para fornecer uma explicação ou definição para a abreviação, especialmente quando o significado pode não ser claro para todos os leitores.</p>
